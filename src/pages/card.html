<main class="equilibrium">
  <!--* Equilibrium Image *-->
  <figure class="equilibrium__figure">
    <img id="img1" class="equilibrium__figure-image" alt="image-equilibrium"/>
    <img id="img2" class="equilibrium__figure-icon" alt="icon-view" />
  </figure>

  <!--* Description of Equilibrium *-->
  <h1 class="equilibrium__title">Equilibrium #3429</h1>
  <p class="equilibrium__description">Our Equilibrium collection promotes balance and calm.</p>

  <!--* Price Information and Days *-->
  <section class="info">
    <!--* Price *-->
    <div class="info__price">
      <img id="img3" class="info__price-icon" alt="icon-ethereum" />
      <h3 class="info__price-value">0.041 ETH</h3>
    </div>

    <!--* Days *-->
    <div class="info__days">
      <img id="img4" class="info__days-icon" alt="icon-clock" />
      <h3 class="info__days-value">3 days left</h2>
    </div>
  </section>

  <!--* Line *-->
  <hr class="divider"/>

  <!--* User Information *-->
  <section class="user">
    <img id="img5" class="user__avatar" alt="image-avatar">
    <h2 class="user__name">Creation of <span class="user__name-highlight">Jules Wyvern</span></h2>
  </section>
</main>
